name: Deploy to Bluehost

# Auto-deploys the site to Bluehost via FTP on every push to master.
# Requires two GitHub repo secrets:
#   FTP_USERNAME  =  bryce@lfg.obp.mybluehost.me
#   FTP_PASSWORD  =  (the FTP password)
# Add them under: GitHub repo → Settings → Secrets and variables → Actions → New repository secret

on:
  push:
    branches: [ master ]
  workflow_dispatch:        # lets you trigger a deploy manually from the Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Bluehost via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: lfg.obp.mybluehost.me
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          server-dir: website_7adb4679/
          # Don't upload repo/dev files to the live server:
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/*.md
            **/icon-src.svg
            **/*.zip
